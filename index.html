<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TEMSCO Pilot Flight & Duty Time Log</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #111827;
      --line: #111827;
      --soft-line: #94a3b8;
      --header: #e5e7eb;
      --subtle: #f8fafc;
      --flight: #22c55e;
      --duty: #facc15;
      --blue: #2563eb;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: #dbe4ee;
      color: var(--ink);
    }

    .sheet {
      max-width: 1500px;
      margin: 0 auto;
      background: var(--paper);
      border: 1.5px solid var(--line);
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      padding: 10px;
    }

    .sheet-header {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .sheet-title {
      text-align: center;
      padding-top: 4px;
    }

    .sheet-title .company {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }

    .sheet-title .form-title {
      font-size: 20px;
      font-weight: bold;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .sheet-title .note {
      font-size: 10px;
      margin-top: 4px;
    }

    .header-box {
      border: 1px solid var(--line);
      background: white;
    }

    .header-box-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      border-bottom: 1px solid var(--line);
      min-height: 30px;
    }

    .header-box-row:last-child {
      border-bottom: none;
    }

    .header-label {
      background: var(--header);
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 4px;
    }

    .header-value {
      display: flex;
      align-items: center;
      padding: 0;
      background: white;
    }

    .header-value input {
      width: 100%;
      height: 100%;
      border: none;
      padding: 6px 8px;
      font-size: 11px;
      background: transparent;
    }

    .header-value input:focus,
    .sheet-cell input:focus {
      outline: 1.5px solid #60a5fa;
      outline-offset: -1px;
    }

    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 8px 0 10px;
    }

    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 6px 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
    }

    .flight-btn { background: #dcfce7; }
    .duty-btn { background: #fef3c7; }
    .add-btn { background: #dbeafe; }
    .clear-btn { background: #fee2e2; }
    .save-btn { background: #d1fae5; }
    .load-btn { background: #e0e7ff; }
    .delete-btn { background: #fee2e2; }

    .active {
      outline: 1.5px solid var(--line);
    }

    .mode-line {
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .page-grid-wrap {
      border: 1.5px solid var(--line);
      overflow-x: auto;
      background: white;
    }

    .page-grid {
      display: grid;
      grid-template-columns:
        56px
        92px
        52px
        52px
        52px
        52px
        44px
        repeat(48, minmax(12px, 1fr));
      min-width: 1080px;
    }

    .sheet-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      font-size: 10px;
      text-align: center;
      line-height: 1.1;
      background: white;
    }

    .sheet-cell.header {
      background: var(--header);
      font-weight: bold;
    }

    .sheet-cell.subhead {
      background: var(--subtle);
      font-weight: bold;
    }

    .sheet-cell.row-label {
      background: var(--subtle);
      font-weight: bold;
      font-size: 10px;
    }

    .sheet-cell.readout {
      font-weight: bold;
    }

    .sheet-cell input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 10px;
      padding: 2px 3px;
    }

    .time-subhead {
      font-size: 8px;
      min-height: 18px;
      background: var(--subtle);
    }

    .flight-cell {
      padding: 0;
      min-height: 24px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }

    .tenth {
      min-height: 24px;
      border-right: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
    }

    .tenth:last-child {
      border-right: none;
    }

    .tenth.on {
      background: var(--flight);
    }

    .duty-cell {
      padding: 0;
      min-height: 24px;
      background: white;
      cursor: pointer;
    }

    .duty-cell.on {
      background: var(--duty);
    }

    .duty-cell.pending {
      outline: 1.5px solid #000;
      outline-offset: -1px;
    }

    .status {
      margin-top: 8px;
      min-height: 18px;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
    }

    .saved-wrap {
      margin-top: 12px;
      border: 1.5px solid var(--line);
      background: white;
    }

    .saved-title {
      background: var(--header);
      border-bottom: 1px solid var(--line);
      padding: 6px 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      font-size: 11px;
    }

    .saved-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--soft-line);
    }

    .saved-row:last-child {
      border-bottom: none;
    }

    .saved-meta {
      font-size: 11px;
      line-height: 1.3;
    }

    .saved-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .sheet {
        max-width: 100%;
        border: none;
        box-shadow: none;
        padding: 0;
      }

      .controls,
      .status,
      .saved-wrap {
        display: none;
      }

      .page-grid {
        min-width: 0;
        width: 100%;
        grid-template-columns:
          48px
          78px
          42px
          42px
          42px
          42px
          48px
          repeat(48, minmax(10px, 1fr));
      }

      .sheet-cell {
        min-height: 18px;
        font-size: 8px;
      }

      .time-subhead {
        font-size: 7px;
      }

      .flight-cell,
      .duty-cell,
      .tenth {
        min-height: 18px;
      }
    }

    @media (max-width: 900px) {
      .sheet-header {
        grid-template-columns: 1fr;
      }

      .sheet-title .form-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="sheet-header">
      <div class="sheet-title">
        <div class="company">TEMSCO HELICOPTERS INC.</div>
        <div class="form-title">Pilot's Flight & Duty Time Log</div>
        <div class="note">Multi-row printable layout modeled on the scanned form. :contentReference[oaicite:2]{index=2}</div>
      </div>

      <div class="header-box">
        <div class="header-box-row">
          <div class="header-label">PILOT NAME</div>
          <div class="header-value">
            <input id="pilotName" type="text" placeholder="Pilot name" />
          </div>
        </div>
        <div class="header-box-row">
          <div class="header-label">PERIOD</div>
          <div class="header-value">
            <input id="logPeriod" type="text" placeholder="e.g. 2026 or Jan 2026" />
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="flightBtn" class="flight-btn active" type="button">Flight Mode</button>
      <button id="dutyBtn" class="duty-btn" type="button">Duty Mode</button>
      <button id="addRowBtn" class="add-btn" type="button">Add Row</button>
      <button id="clearCurrentBtn" class="clear-btn" type="button">Clear Current Row</button>
      <button id="saveAllBtn" class="save-btn" type="button">Save All Rows</button>
      <button id="loadSavedBtn" class="load-btn" type="button">Load Saved Rows</button>
    </div>

    <div class="mode-line">MODE: <span id="modeDisplay">FLIGHT</span> | CURRENT ROW: <span id="currentRowDisplay">1</span></div>

    <div class="page-grid-wrap">
      <div id="pageGrid" class="page-grid"></div>
    </div>

    <div id="status" class="status"></div>

    <div class="saved-wrap">
      <div class="saved-title">Saved Batches / Entries</div>
      <div id="savedList"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient(
      "https://xjisftmfjsjomgsjzkod.supabase.co",
      "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
    );

    let mode = "flight";
    let isDrawing = false;
    let currentRowId = 1;
    let rows = [];
    let rowCounter = 1;

    const DEFAULT_ROW_COUNT = 8;

    const pageGrid = document.getElementById("pageGrid");
    const flightBtn = document.getElementById("flightBtn");
    const dutyBtn = document.getElementById("dutyBtn");
    const addRowBtn = document.getElementById("addRowBtn");
    const clearCurrentBtn = document.getElementById("clearCurrentBtn");
    const saveAllBtn = document.getElementById("saveAllBtn");
    const loadSavedBtn = document.getElementById("loadSavedBtn");
    const modeDisplay = document.getElementById("modeDisplay");
    const currentRowDisplay = document.getElementById("currentRowDisplay");
    const statusEl = document.getElementById("status");
    const savedList = document.getElementById("savedList");

    function setMode(newMode) {
      mode = newMode;
      modeDisplay.textContent = newMode.toUpperCase();
      flightBtn.classList.toggle("active", newMode === "flight");
      dutyBtn.classList.toggle("active", newMode === "duty");
    }

    function setCurrentRow(rowId) {
      currentRowId = rowId;
      currentRowDisplay.textContent = rowId;
      document.querySelectorAll(".sheet-cell.row-label").forEach(el => {
        el.style.outline = "";
      });
      const labels = document.querySelectorAll(`.sheet-cell.row-label[data-row-id="${rowId}"]`);
      labels.forEach(el => {
        el.style.outline = "1.5px solid #2563eb";
        el.style.outlineOffset = "-1px";
      });
    }

    function formatHalfHourBlock(blockIndex) {
      const hours = Math.floor(blockIndex / 2);
      const minutes = blockIndex % 2 === 0 ? "00" : "30";
      return `${String(hours).padStart(2, "0")}:${minutes}`;
    }

    function formatDateForRow(dateValue) {
      if (!dateValue) return "";
      if (/^\d{2}\/\d{2}$/.test(dateValue)) return dateValue;
      const parts = dateValue.split("-");
      if (parts.length === 3) return `${parts[1]}/${parts[2]}`;
      return dateValue;
    }

    function buildStoredDate(mmdd, periodValue) {
      const cleaned = (mmdd || "").trim();
      if (!/^\d{2}\/\d{2}$/.test(cleaned)) return cleaned;

      const yearMatch = (periodValue || "").match(/\b(20\d{2}|19\d{2})\b/);
      if (yearMatch) {
        const [mm, dd] = cleaned.split("/");
        return `${yearMatch[1]}-${mm}-${dd}`;
      }
      return cleaned;
    }

    function autoFormatMMDDInput(input) {
      let value = input.value.replace(/[^\d]/g, "").slice(0, 4);
      if (value.length >= 3) value = value.slice(0, 2) + "/" + value.slice(2);
      input.value = value;
    }

    function getRow(rowId) {
      return rows.find(r => r.id === rowId);
    }

    function makeEmptyRow(id) {
      return {
        id,
        dutyStartBlock: null
      };
    }

    function createCell(className = "", text = "") {
      const div = document.createElement("div");
      div.className = `sheet-cell ${className}`.trim();
      div.textContent = text;
      return div;
    }

    function createInputCell(rowId, key, placeholder = "", maxLength = null) {
      const div = document.createElement("div");
      div.className = "sheet-cell";

      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = placeholder;
      input.dataset.rowId = rowId;
      input.dataset.key = key;
      if (maxLength) input.maxLength = maxLength;

      input.addEventListener("focus", () => setCurrentRow(rowId));

      if (key === "logDate") {
        input.addEventListener("input", () => autoFormatMMDDInput(input));
      }

      div.appendChild(input);
      return div;
    }

    function createReadoutCell(rowId, key, initial = "") {
      const div = document.createElement("div");
      div.className = "sheet-cell readout";
      div.dataset.rowId = rowId;
      div.dataset.key = key;
      div.textContent = initial;
      return div;
    }

    function createFlightCell(rowId, blockIndex) {
      const cell = document.createElement("div");
      cell.className = "sheet-cell flight-cell";
      cell.dataset.rowId = rowId;
      cell.dataset.blockIndex = blockIndex;

      for (let j = 0; j < 5; j++) {
        const tenth = document.createElement("div");
        tenth.className = "tenth";
        tenth.dataset.rowId = rowId;
        tenth.dataset.block = blockIndex;
        tenth.dataset.tenth = j;

        tenth.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (mode !== "flight") return;
          setCurrentRow(rowId);
          isDrawing = true;
          paintFlight(tenth);
        });

        tenth.addEventListener("mouseenter", () => {
          if (isDrawing && mode === "flight" && Number(tenth.dataset.rowId) === currentRowId) {
            paintFlight(tenth);
          }
        });

        tenth.addEventListener("click", () => {
          if (mode !== "flight") return;
          setCurrentRow(rowId);
          paintFlight(tenth);
        });

        cell.appendChild(tenth);
      }

      return cell;
    }

    function createDutyCell(rowId, blockIndex) {
      const cell = document.createElement("div");
      cell.className = "sheet-cell duty-cell";
      cell.dataset.rowId = rowId;
      cell.dataset.block = blockIndex;

      cell.addEventListener("click", () => {
        if (mode !== "duty") return;
        setCurrentRow(rowId);
        handleDutyClick(cell);
      });

      return cell;
    }

    function getDutyRange(rowId) {
      const activeBlocks = [];
      document.querySelectorAll(`.duty-cell[data-row-id="${rowId}"].on`).forEach((cell) => {
        activeBlocks.push(Number(cell.dataset.block));
      });

      if (activeBlocks.length === 0) return null;

      activeBlocks.sort((a, b) => a - b);

      const startBlock = activeBlocks[0];
      const lastBlock = activeBlocks[activeBlocks.length - 1];
      const stopBlockExclusive = lastBlock + 1;

      return {
        startBlock,
        stopBlockExclusive,
        startText: formatHalfHourBlock(startBlock),
        stopText: formatHalfHourBlock(stopBlockExclusive)
      };
    }

    function getReadout(rowId, key) {
      return document.querySelector(`.sheet-cell.readout[data-row-id="${rowId}"][data-key="${key}"]`);
    }

    function clearDutyPending(rowId) {
      document.querySelectorAll(`.duty-cell.pending[data-row-id="${rowId}"]`).forEach((el) => {
        el.classList.remove("pending");
      });
    }

    function setDutyPending(rowId, blockIndex) {
      clearDutyPending(rowId);
      const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${blockIndex}"]`);
      if (cell) cell.classList.add("pending");
    }

    function clearDutyRow(rowId) {
      document.querySelectorAll(`.duty-cell[data-row-id="${rowId}"].on`).forEach((el) => el.classList.remove("on"));
      clearDutyPending(rowId);
      const row = getRow(rowId);
      if (row) row.dutyStartBlock = null;
    }

    function fillDutyRange(rowId, startBlock, stopBlock) {
      const start = Math.min(startBlock, stopBlock);
      const end = Math.max(startBlock, stopBlock);

      clearDutyRow(rowId);

      for (let i = start; i <= end; i++) {
        const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${i}"]`);
        if (cell) cell.classList.add("on");
      }

      updateTotals(rowId);
    }

    function handleDutyClick(cell) {
      const rowId = Number(cell.dataset.rowId);
      const row = getRow(rowId);
      if (!row) return;

      const block = Number(cell.dataset.block);

      if (row.dutyStartBlock === null) {
        clearDutyRow(rowId);
        row.dutyStartBlock = block;
        setDutyPending(rowId, block);
        updateTotals(rowId);
        statusEl.textContent = `Row ${rowId}: duty start set. Click stop time.`;
        return;
      }

      fillDutyRange(rowId, row.dutyStartBlock, block);
      row.dutyStartBlock = null;
      clearDutyPending(rowId);
      statusEl.textContent = `Row ${rowId}: duty range filled.`;
    }

    function paintFlight(tenth) {
      if (mode !== "flight") return;
      tenth.classList.add("on");
      updateTotals(Number(tenth.dataset.rowId));
    }

    function updateTotals(rowId) {
      let flight = 0;
      let duty = 0;

      document.querySelectorAll(`.tenth.on[data-row-id="${rowId}"]`).forEach(() => {
        flight += 0.1;
      });

      document.querySelectorAll(`.duty-cell.on[data-row-id="${rowId}"]`).forEach(() => {
        duty += 0.5;
      });

      const dutyRange = getDutyRange(rowId);

      getReadout(rowId, "flightTotal").textContent = flight.toFixed(1);
      getReadout(rowId, "dutyTotal").textContent = duty.toFixed(1);
      getReadout(rowId, "dutyStart").textContent = dutyRange ? dutyRange.startText : "--:--";
      getReadout(rowId, "dutyStop").textContent = dutyRange ? dutyRange.stopText : "--:--";
    }

    function clearRow(rowId) {
      document.querySelectorAll(`.tenth.on[data-row-id="${rowId}"]`).forEach(el => el.classList.remove("on"));
      clearDutyRow(rowId);

      const dateInput = document.querySelector(`input[data-row-id="${rowId}"][data-key="logDate"]`);
      const acInput = document.querySelector(`input[data-row-id="${rowId}"][data-key="aircraftName"]`);

      if (dateInput) dateInput.value = "";
      if (acInput) acInput.value = "";

      updateTotals(rowId);
      statusEl.textContent = `Row ${rowId} cleared.`;
    }

    function getFlightBlocks(rowId) {
      const blocks = [];
      for (let i = 0; i < 48; i++) {
        let count = 0;
        document.querySelectorAll(`.tenth[data-row-id="${rowId}"][data-block="${i}"].on`).forEach(() => {
          count += 1;
        });
        blocks.push(Number((count * 0.1).toFixed(1)));
      }
      return blocks;
    }

    function getDutyBlocks(rowId) {
      const blocks = [];
      for (let i = 0; i < 48; i++) {
        const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${i}"]`);
        blocks.push(cell && cell.classList.contains("on") ? 0.5 : 0);
      }
      return blocks;
    }

    function loadRowFromData(rowId, entry) {
      const dateInput = document.querySelector(`input[data-row-id="${rowId}"][data-key="logDate"]`);
      const acInput = document.querySelector(`input[data-row-id="${rowId}"][data-key="aircraftName"]`);

      if (dateInput) dateInput.value = formatDateForRow(entry.log_date) || "";
      if (acInput) acInput.value = entry.aircraft_name || "";

      clearRow(rowId);

      if (dateInput) dateInput.value = formatDateForRow(entry.log_date) || "";
      if (acInput) acInput.value = entry.aircraft_name || "";

      if (Array.isArray(entry.flight_blocks)) {
        entry.flight_blocks.forEach((value, blockIndex) => {
          const tenthsToFill = Math.round((Number(value) || 0) * 10);
          for (let i = 0; i < tenthsToFill; i++) {
            const tenth = document.querySelector(`.tenth[data-row-id="${rowId}"][data-block="${blockIndex}"][data-tenth="${i}"]`);
            if (tenth) tenth.classList.add("on");
          }
        });
      }

      if (Array.isArray(entry.duty_blocks)) {
        entry.duty_blocks.forEach((value, blockIndex) => {
          if (Number(value) > 0) {
            const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${blockIndex}"]`);
            if (cell) cell.classList.add("on");
          }
        });
      }

      const row = getRow(rowId);
      if (row) row.dutyStartBlock = null;

      clearDutyPending(rowId);
      updateTotals(rowId);
    }

    function addDataRow(rowId) {
      pageGrid.appendChild(createInputCell(rowId, "logDate", "MM/DD", 5));
      pageGrid.appendChild(createInputCell(rowId, "aircraftName", "Aircraft"));
      pageGrid.appendChild(createReadoutCell(rowId, "dutyStart", "--:--"));
      pageGrid.appendChild(createReadoutCell(rowId, "dutyStop", "--:--"));
      pageGrid.appendChild(createReadoutCell(rowId, "dutyTotal", "0.0"));
      pageGrid.appendChild(createReadoutCell(rowId, "flightTotal", "0.0"));

      const flightLabel = createCell("row-label", "FLIGHT");
      flightLabel.dataset.rowId = rowId;
      flightLabel.addEventListener("click", () => setCurrentRow(rowId));
      pageGrid.appendChild(flightLabel);

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createFlightCell(rowId, i));
      }

      pageGrid.appendChild(createCell("subhead", ""));
      pageGrid.appendChild(createCell("subhead", ""));
      pageGrid.appendChild(createCell("readout", ""));
      pageGrid.appendChild(createCell("readout", ""));
      pageGrid.appendChild(createCell("readout", ""));
      pageGrid.appendChild(createCell("readout", ""));

      const dutyLabel = createCell("row-label", "DUTY");
      dutyLabel.dataset.rowId = rowId;
      dutyLabel.addEventListener("click", () => setCurrentRow(rowId));
      pageGrid.appendChild(dutyLabel);

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createDutyCell(rowId, i));
      }
    }

    function buildPage() {
      pageGrid.innerHTML = "";
      rows = [];
      rowCounter = 1;

      pageGrid.appendChild(createCell("header", "DATE"));
      pageGrid.appendChild(createCell("header", "A/C"));
      pageGrid.appendChild(createCell("header", "DUTY TIME"));
      pageGrid.appendChild(createCell("header", ""));
      pageGrid.appendChild(createCell("header", ""));
      pageGrid.appendChild(createCell("header", "TOTALS"));
      pageGrid.appendChild(createCell("header", "ROW"));

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createCell("header", i === 0 ? "TIME" : ""));
      }

      pageGrid.appendChild(createCell("subhead", "MM/DD"));
      pageGrid.appendChild(createCell("subhead", "Aircraft"));
      pageGrid.appendChild(createCell("subhead", "Start"));
      pageGrid.appendChild(createCell("subhead", "Stop"));
      pageGrid.appendChild(createCell("subhead", "Duty"));
      pageGrid.appendChild(createCell("subhead", "Flight"));
      pageGrid.appendChild(createCell("subhead", "Type"));

      for (let i = 0; i < 48; i++) {
        const text = i % 2 === 0 ? String(i / 2) : "";
        pageGrid.appendChild(createCell("sheet-cell time-subhead", text));
      }

      for (let i = 0; i < DEFAULT_ROW_COUNT; i++) {
        const row = makeEmptyRow(rowCounter++);
        rows.push(row);
        addDataRow(row.id);
      }

      setCurrentRow(1);
    }

    function addBlankRow() {
      const row = makeEmptyRow(rowCounter++);
      rows.push(row);
      addDataRow(row.id);
      setCurrentRow(row.id);
      statusEl.textContent = `Added row ${row.id}.`;
    }

    async function getCurrentUser() {
      const { data, error } = await sb.auth.getSession();
      if (error) {
        console.error("Session error:", error);
        return null;
      }
      return data.session?.user ?? null;
    }

    function collectRowPayloads(userId) {
      const pilotName = document.getElementById("pilotName").value.trim();
      const logPeriod = document.getElementById("logPeriod").value.trim();
      const payloads = [];

      for (const row of rows) {
        const rowId = row.id;
        const logDateRaw = document.querySelector(`input[data-row-id="${rowId}"][data-key="logDate"]`)?.value.trim() || "";
        const aircraftName = document.querySelector(`input[data-row-id="${rowId}"][data-key="aircraftName"]`)?.value.trim() || "";

        const flightBlocks = getFlightBlocks(rowId);
        const dutyBlocks = getDutyBlocks(rowId);
        const flightTotal = Number(getReadout(rowId, "flightTotal").textContent || "0");
        const dutyTotal = Number(getReadout(rowId, "dutyTotal").textContent || "0");
        const dutyRange = getDutyRange(rowId);

        const hasAnyData =
          logDateRaw ||
          aircraftName ||
          flightTotal > 0 ||
          dutyTotal > 0;

        if (!hasAnyData) continue;

        if (!/^\d{2}\/\d{2}$/.test(logDateRaw)) {
          throw new Error(`Row ${rowId}: enter date as MM/DD.`);
        }

        if (!aircraftName) {
          throw new Error(`Row ${rowId}: please enter an aircraft.`);
        }

        if (flightTotal > dutyTotal) {
          throw new Error(`Row ${rowId}: flight cannot exceed duty.`);
        }

        if (dutyTotal > 14) {
          throw new Error(`Row ${rowId}: duty exceeds 14 hours.`);
        }

        payloads.push({
          log_date: buildStoredDate(logDateRaw, logPeriod),
          aircraft_name: aircraftName,
          flight_blocks: flightBlocks,
          duty_blocks: dutyBlocks,
          flt1: flightTotal,
          duty: dutyTotal,
          duty_start: dutyRange ? dutyRange.startText : null,
          duty_stop: dutyRange ? dutyRange.stopText : null,
          pilot_name: pilotName || null,
          period: logPeriod || null,
          user_id: userId
        });
      }

      return payloads;
    }

    async function saveAllRows() {
      statusEl.textContent = "";

      const user = await getCurrentUser();
      if (!user) {
        statusEl.textContent = "Not logged in. Please sign in first.";
        return;
      }

      let payloads;
      try {
        payloads = collectRowPayloads(user.id);
      } catch (err) {
        statusEl.textContent = err.message;
        return;
      }

      if (payloads.length === 0) {
        statusEl.textContent = "No filled rows to save.";
        return;
      }

      const { error } = await sb.from("logs").insert(payloads);

      if (error) {
        statusEl.textContent = error.message;
        console.error("Insert error:", error);
        return;
      }

      statusEl.textContent = `Saved ${payloads.length} row(s).`;
      await loadSavedEntries();
    }

    async function loadSavedEntries() {
      const user = await getCurrentUser();

      if (!user) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">No user session.</div></div>`;
        return;
      }

      const { data, error } = await sb
        .from("logs")
        .select("id, log_date, aircraft_name, flt1, duty, duty_start, duty_stop, pilot_name, period, flight_blocks, duty_blocks")
        .eq("user_id", user.id)
        .order("id", { ascending: false });

      if (error) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">${error.message}</div></div>`;
        console.error("Load error:", error);
        return;
      }

      if (!data || data.length === 0) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">No saved entries yet.</div></div>`;
        return;
      }

      savedList.innerHTML = "";

      const preview = data.slice(0, 12);

      preview.forEach((entry, index) => {
        const row = document.createElement("div");
        row.className = "saved-row";

        row.innerHTML = `
          <div class="saved-meta">
            <strong>${formatDateForRow(entry.log_date) || "-"}</strong> |
            A/C ${entry.aircraft_name || "-"} |
            DUTY ${entry.duty_start || "--:--"}-${entry.duty_stop || "--:--"} |
            DUTY TOTAL ${Number(entry.duty || 0).toFixed(1)} |
            FLIGHT TOTAL ${Number(entry.flt1 || 0).toFixed(1)}
            ${entry.period ? `| PERIOD ${entry.period}` : ""}
          </div>
          <div class="saved-actions"></div>
        `;

        const actions = row.querySelector(".saved-actions");

        const loadBtn = document.createElement("button");
        loadBtn.type = "button";
        loadBtn.className = "load-btn";
        loadBtn.textContent = "Load to Row";
        loadBtn.onclick = () => {
          loadRowFromData(currentRowId, entry);
          document.getElementById("pilotName").value = entry.pilot_name || "";
          document.getElementById("logPeriod").value = entry.period || "";
          statusEl.textContent = `Loaded saved entry into row ${currentRowId}.`;
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = async () => {
          const { error } = await sb.from("logs").delete().eq("id", entry.id);
          if (error) {
            statusEl.textContent = error.message;
            return;
          }
          statusEl.textContent = "Entry deleted.";
          await loadSavedEntries();
        };

        actions.appendChild(loadBtn);
        actions.appendChild(deleteBtn);
        row.appendChild(actions);
        savedList.appendChild(row);
      });

      if (data.length > preview.length) {
        const more = document.createElement("div");
        more.className = "saved-row";
        more.innerHTML = `<div class="saved-meta">Showing ${preview.length} of ${data.length} saved entries.</div>`;
        savedList.appendChild(more);
      }
    }

    document.addEventListener("mouseup", () => {
      isDrawing = false;
    });

    flightBtn.addEventListener("click", () => setMode("flight"));
    dutyBtn.addEventListener("click", () => setMode("duty"));
    addRowBtn.addEventListener("click", addBlankRow);
    clearCurrentBtn.addEventListener("click", () => clearRow(currentRowId));
    saveAllBtn.addEventListener("click", saveAllRows);
    loadSavedBtn.addEventListener("click", loadSavedEntries);

    buildPage();
    setMode("flight");
    loadSavedEntries();
  </script>
</body>
</html>
