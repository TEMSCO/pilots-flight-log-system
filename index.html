<!DOCTYPE html>
<html>
<head>
  <title>Pilot Logbook Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 700px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .save-btn { background: #22c55e; color: white; width: 100%; }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 6px;
      border-bottom: 1px solid #475569;
    }

    th {
      background: #0f172a;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Pilot Logbook</h2>

  <h3>Add Flight</h3>

  <input id="date" type="date">
  <input id="aircraft" placeholder="Aircraft">

  <input id="pic" placeholder="PIC Hours">
  <input id="night" placeholder="Night Hours">
  <input id="training" placeholder="Training Hours">

  <input id="flight" placeholder="Flight Time">
  <input id="duty" placeholder="Duty Time">

  <input id="remarks" placeholder="Remarks">

  <button class="save-btn" onclick="addLog()">Save Flight</button>

  <p id="status"></p>

  <h3>Flight Logs</h3>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>A/C</th>
        <th>PIC</th>
        <th>Night</th>
        <th>Trng</th>
        <th>FLT</th>
        <th>DUTY</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="logList"></tbody>
  </table>

  <h3>Total Flight Hours: <span id="totalHours">0</span></h3>

  <canvas id="chart"></canvas>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
window.addEventListener("load", () => {

  const sb = window.supabase.createClient(
    "https://xjisftmfjsjomgsjzkod.supabase.co",
    "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
  );

  let chart;

  function drawChart(data) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: data.map(d => d.date),
        datasets: [{
          label: "Flight Time",
          data: data.map(d => parseFloat(d.flight)),
          borderWidth: 2
        }]
      }
    });
  }

  window.loadLogs = async function () {
    const { data: userData } = await sb.auth.getUser();
    const user = userData.user;

    const { data } = await sb
      .from("logs")
      .select("*")
      .eq("user_id", user.id);

    const list = document.getElementById("logList");
    list.innerHTML = "";

    let total = 0;

    if (data) {
      drawChart(data);

      data.forEach(log => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${log.date}</td>
          <td>${log.aircraft}</td>
          <td>${log.pic}</td>
          <td>${log.night}</td>
          <td>${log.training}</td>
          <td>${log.flight}</td>
          <td>${log.duty}</td>
          <td></td>
        `;

        const actions = row.children[7];

        const edit = document.createElement("button");
        edit.textContent = "Edit";
        edit.className = "edit-btn";
        edit.onclick = () => editLog(log);

        const del = document.createElement("button");
        del.textContent = "Delete";
        del.className = "delete-btn";
        del.onclick = () => deleteLog(log.id);

        actions.appendChild(edit);
        actions.appendChild(del);

        list.appendChild(row);

        total += parseFloat(log.flight) || 0;
      });
    }

    document.getElementById("totalHours").innerText = total.toFixed(1);
  };

  window.addLog = async function () {
    const { data: userData } = await sb.auth.getUser();
    const user = userData.user;

    const log = {
      date: date.value,
      aircraft: aircraft.value,
      pic: pic.value,
      night: night.value,
      training: training.value,
      flight: flight.value,
      duty: duty.value,
      remarks: remarks.value,
      user_id: user.id
    };

    const { error } = await sb.from("logs").insert([log]);

    if (error) {
      status.innerText = error.message;
    } else {
      status.innerText = "Saved!";
      loadLogs();
    }
  };

  window.deleteLog = async function (id) {
    await sb.from("logs").delete().eq("id", id);
    loadLogs();
  };

  window.editLog = function (log) {
    const newFlight = prompt("Edit Flight Time:", log.flight);
    if (!newFlight) return;

    sb.from("logs")
      .update({ flight: newFlight })
      .eq("id", log.id)
      .then(loadLogs);
  };

  loadLogs();
});
</script>

</body>
</html>
