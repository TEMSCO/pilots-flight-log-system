<!DOCTYPE html>
<html>
<head>
  <title>Flight Log - Paint Mode</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .flight-btn { background: #22c55e; }
    .duty-btn { background: #facc15; color: black; }
    .clear-btn { background: #ef4444; }

    .grid {
      display: grid;
      grid-template-columns: 80px repeat(24, 1fr);
      gap: 2px;
    }

    .cell {
      height: 25px;
      background: #1e293b;
      cursor: pointer;
    }

    .header {
      font-size: 10px;
      text-align: center;
      background: #334155;
      padding: 4px;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .flight { background: #22c55e; }
    .duty { background: #facc15; }

    .totals {
      margin-top: 15px;
    }

    .log {
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>✈️ Flight & Duty Log (Paint Mode)</h2>

<div class="controls">
  <button class="flight-btn" onclick="mode='flight'">Flight Mode</button>
  <button class="duty-btn" onclick="mode='duty'">Duty Mode</button>
  <button class="clear-btn" onclick="clearGrid()">Clear</button>
</div>

<div class="grid" id="grid"></div>

<div class="totals">
  Flight: <span id="flightTotal">0</span> hrs |
  Duty: <span id="dutyTotal">0</span> hrs
</div>

<button onclick="saveLog()">Save Entry</button>

<div class="log" id="logList"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://xjisftmfjsjomgsjzkod.supabase.co",
  "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
);

let mode = "flight";
let mouseDown = false;

const grid = document.getElementById("grid");

// HEADER
grid.innerHTML += "<div></div>";
for (let i = 1; i <= 24; i++) {
  grid.innerHTML += `<div class="header">${i}</div>`;
}

// ROWS
["flight", "duty"].forEach(type => {
  grid.innerHTML += `<div class="label">${type.toUpperCase()}</div>`;

  for (let i = 0; i < 24; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.row = type;

    cell.onmousedown = () => {
      mouseDown = true;
      paint(cell);
    };

    cell.onmouseover = () => {
      if (mouseDown) paint(cell);
    };

    grid.appendChild(cell);
  }
});

// GLOBAL MOUSE TRACK
document.body.onmousedown = () => mouseDown = true;
document.body.onmouseup = () => mouseDown = false;

// PAINT
function paint(cell) {
  const rowType = cell.dataset.row;

  if (mode !== rowType) return;

  cell.classList.toggle(mode);

  calculateTotals();
}

// CLEAR
function clearGrid() {
  document.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("flight", "duty");
  });
  calculateTotals();
}

// TOTALS
function calculateTotals() {
  let flight = 0;
  let duty = 0;

  document.querySelectorAll(".cell").forEach(cell => {
    if (cell.classList.contains("flight")) flight++;
    if (cell.classList.contains("duty")) duty++;
  });

  if (duty > 14) {
    alert("⚠️ Duty exceeds 14 hours");
  }

  if (flight > duty) {
    alert("⚠️ Flight cannot exceed duty");
  }

  document.getElementById("flightTotal").innerText = flight;
  document.getElementById("dutyTotal").innerText = duty;
}

// SAVE
async function saveLog() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const flight = parseFloat(flightTotal.innerText);
  const duty = parseFloat(dutyTotal.innerText);

  const { error } = await sb.from("logs").insert([{
    flt1: flight,
    duty: duty,
    user_id: user.id
  }]);

  if (error) alert(error.message);
  else loadLogs();
}

// LOAD
async function loadLogs() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const { data } = await sb
    .from("logs")
    .select("*")
    .eq("user_id", user.id)
    .order("id", { ascending: false });

  logList.innerHTML = "";

  if (data) {
    data.forEach(log => {
      logList.innerHTML += `
        <div>FLT: ${log.flt1} | DUTY: ${log.duty}</div>
      `;
    });
  }
}

loadLogs();
</script>

</body>
</html>
