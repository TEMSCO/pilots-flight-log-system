<!DOCTYPE html>
<html>
<head>
  <title>Flight Log - Final Mode</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .flight-btn { background: #22c55e; }
    .duty-btn { background: #facc15; color: black; }
    .clear-btn { background: #ef4444; }

    .grid {
      display: grid;
      grid-template-columns: 80px repeat(48, 1fr);
      gap: 2px;
    }

    .cell {
      height: 25px;
      background: #1e293b;
      cursor: pointer;
    }

    .header {
      font-size: 10px;
      text-align: center;
      background: #334155;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .flight { background: #22c55e; }
    .duty { background: #facc15; }

    .totals {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2>✈️ Flight & Duty Log</h2>

<div class="controls">
  <button class="flight-btn" onclick="mode='flight'">Flight Mode</button>
  <button class="duty-btn" onclick="mode='duty'">Duty Mode</button>
  <button class="clear-btn" onclick="clearGrid()">Clear</button>
</div>

<div class="grid" id="grid"></div>

<div class="totals">
  Flight: <span id="flightTotal">0.0</span> hrs |
  Duty: <span id="dutyTotal">0.0</span> hrs
</div>

<script>
let mode = "flight";
let mouseDown = false;

const grid = document.getElementById("grid");

// HEADER (0–24 in 0.5 steps)
grid.innerHTML += "<div></div>";
for (let i = 0; i < 48; i++) {
  if (i % 2 === 0) {
    grid.innerHTML += `<div class="header">${i/2}</div>`;
  } else {
    grid.innerHTML += `<div class="header"></div>`;
  }
}

// ROWS
["flight", "duty"].forEach(type => {
  grid.innerHTML += `<div class="label">${type.toUpperCase()}</div>`;

  for (let i = 0; i < 48; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.row = type;
    cell.dataset.value = 0; // for flight tenths

    cell.onmousedown = () => {
      mouseDown = true;
      paint(cell);
    };

    cell.onmouseover = () => {
      if (mouseDown) paint(cell);
    };

    grid.appendChild(cell);
  }
});

// MOUSE TRACK
document.body.onmouseup = () => mouseDown = false;

// PAINT FUNCTION
function paint(cell) {
  if (cell.dataset.row !== mode) return;

  if (mode === "duty") {
    // toggle duty block (0.5)
    cell.classList.toggle("duty");

  } else if (mode === "flight") {
    // increase in tenths (0 → 0.1 → 0.2 ... up to 0.5)
    let val = parseFloat(cell.dataset.value);

    val += 0.1;
    if (val > 0.5) val = 0;

    cell.dataset.value = val.toFixed(1);

    if (val > 0) {
      cell.classList.add("flight");
      cell.style.opacity = 0.3 + val; // visual intensity
    } else {
      cell.classList.remove("flight");
      cell.style.opacity = 1;
    }
  }

  calculateTotals();
}

// CLEAR
function clearGrid() {
  document.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("flight", "duty");
    c.dataset.value = 0;
    c.style.opacity = 1;
  });
  calculateTotals();
}

// TOTALS
function calculateTotals() {
  let flight = 0;
  let duty = 0;

  document.querySelectorAll(".cell").forEach(cell => {
    if (cell.classList.contains("duty")) duty += 0.5;

    if (cell.classList.contains("flight")) {
      flight += parseFloat(cell.dataset.value);
    }
  });

  flight = parseFloat(flight.toFixed(1));
  duty = parseFloat(duty.toFixed(1));

  if (duty > 14) alert("⚠️ Duty exceeds 14 hours");
  if (flight > duty) alert("⚠️ Flight cannot exceed duty");

  document.getElementById("flightTotal").innerText = flight.toFixed(1);
  document.getElementById("dutyTotal").innerText = duty.toFixed(1);
}
</script>

</body>
</html>
