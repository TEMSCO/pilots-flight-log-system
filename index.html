<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TEMSCO Pilot Flight & Duty Time Log</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #111827;
      --line: #111827;
      --soft-line: #94a3b8;
      --header: #e5e7eb;
      --subtle: #f8fafc;
      --duty: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 8px;
      font-family: Arial, sans-serif;
      background: #dbe4ee;
      color: var(--ink);
    }

    .sheet {
      max-width: 1500px;
      margin: 0 auto;
      background: var(--paper);
      border: 1.5px solid var(--line);
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      padding: 8px;
    }

    .sheet-header {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
    }

    .sheet-title {
      text-align: center;
      padding-top: 2px;
    }

    .sheet-title .company {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }

    .sheet-title .form-title {
      font-size: 20px;
      font-weight: bold;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .sheet-title .note {
      font-size: 10px;
      margin-top: 3px;
    }

    .header-box {
      border: 1px solid var(--line);
      background: white;
    }

    .header-box-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      border-bottom: 1px solid var(--line);
      min-height: 28px;
    }

    .header-box-row:last-child {
      border-bottom: none;
    }

    .header-label {
      background: var(--header);
      border-right: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 4px;
    }

    .header-value {
      display: flex;
      align-items: center;
      padding: 0;
      background: white;
    }

    .header-value input,
    .sheet-cell input,
    .sheet-cell textarea,
    .aircraft-chip input,
    .aircraft-metric input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .header-value input {
      padding: 5px 6px;
      font-size: 11px;
    }

    .header-value input:focus,
    .sheet-cell input:focus,
    .sheet-cell textarea:focus,
    .aircraft-chip input:focus,
    .aircraft-metric input:focus {
      outline: 1.5px solid #60a5fa;
      outline-offset: -1px;
    }

    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 6px 0 8px;
    }

    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 5px 9px;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
    }

    .duty-btn { background: #fef3c7; }
    .clear-btn { background: #fee2e2; }
    .save-btn { background: #d1fae5; }
    .load-btn { background: #e0e7ff; }
    .delete-btn { background: #fee2e2; }

    .active {
      outline: 1.5px solid var(--line);
    }

    .mode-line {
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    /* Aircraft summary aligned to timeline width */
    .aircraft-layout {
      display: grid;
      grid-template-columns: 284px 1fr 158px;
      gap: 0;
      margin-bottom: 6px;
      align-items: start;
    }

    .aircraft-left-spacer,
    .aircraft-right-spacer {
      min-height: 1px;
    }

    .aircraft-bar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
    }

    .aircraft-stack {
      display: grid;
      grid-template-rows: auto auto;
      gap: 2px;
    }

    .aircraft-chip {
      border: 1.5px solid var(--line);
      min-height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
      cursor: pointer;
      position: relative;
    }

    .aircraft-chip.selected {
      outline: 2px solid var(--line);
      outline-offset: 1px;
    }

    .aircraft-chip input {
      text-align: center;
      font-size: 8px;
      font-weight: bold;
      padding: 3px 2px;
    }

    .aircraft-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
    }

    .aircraft-metric {
      border: 1px solid var(--line);
      background: white;
      min-height: 28px;
      display: grid;
      grid-template-rows: 11px 1fr;
    }

    .aircraft-metric-label {
      border-bottom: 1px solid var(--line);
      background: var(--subtle);
      font-size: 6px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .aircraft-metric-value {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: bold;
      padding: 1px 1px;
      text-align: center;
    }

    .aircraft-metric-value input {
      text-align: center;
      font-size: 8px;
      padding: 1px 1px;
    }

    .page-grid-wrap {
      border: 1.5px solid var(--line);
      overflow-x: auto;
      background: white;
    }

    .page-grid {
      display: grid;
      grid-template-columns:
        44px   /* date */
        40px   /* duty start */
        40px   /* duty stop */
        40px   /* duty total */
        40px   /* flight total */
        36px   /* row label */
        repeat(48, minmax(9px, 1fr))
        30px   /* ldgs */
        48px   /* route */
        80px;  /* remarks */
      min-width: 970px;
    }

    .sheet-cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1px;
      font-size: 8px;
      text-align: center;
      line-height: 1.05;
      background: white;
    }

    .sheet-cell.header {
      background: var(--header);
      font-weight: bold;
      min-height: 18px;
    }

    .sheet-cell.subhead {
      background: var(--subtle);
      font-weight: bold;
      min-height: 16px;
    }

    .sheet-cell.row-label {
      background: var(--subtle);
      font-weight: bold;
      font-size: 8px;
      cursor: pointer;
    }

    .sheet-cell.readout {
      font-weight: bold;
      font-size: 8px;
    }

    .sheet-cell input {
      font-size: 8px;
      padding: 1px 2px;
      text-align: center;
    }

    .sheet-cell textarea {
      resize: none;
      font-size: 8px;
      padding: 2px 3px;
      line-height: 1.1;
    }

    .time-subhead {
      font-size: 6px;
      min-height: 14px;
      background: var(--subtle);
    }

    .flight-cell {
      padding: 0;
      min-height: 18px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }

    .tenth {
      min-height: 18px;
      border-right: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
    }

    .tenth:last-child {
      border-right: none;
    }

    .duty-cell {
      padding: 0;
      min-height: 18px;
      background: white;
      cursor: pointer;
    }

    .duty-cell.on {
      background: var(--duty);
    }

    .duty-cell.pending {
      outline: 1.5px solid #000;
      outline-offset: -1px;
    }

    .status {
      margin-top: 6px;
      min-height: 16px;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
    }

    .saved-wrap {
      margin-top: 10px;
      border: 1.5px solid var(--line);
      background: white;
    }

    .saved-title {
      background: var(--header);
      border-bottom: 1px solid var(--line);
      padding: 5px 7px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      font-size: 11px;
    }

    .saved-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border-bottom: 1px solid var(--soft-line);
    }

    .saved-row:last-child {
      border-bottom: none;
    }

    .saved-meta {
      font-size: 10px;
      line-height: 1.25;
    }

    .saved-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .sheet {
        max-width: 100%;
        border: none;
        box-shadow: none;
        padding: 0;
      }

      .controls,
      .status,
      .saved-wrap {
        display: none;
      }

      .aircraft-layout {
        grid-template-columns: 284px 1fr 158px;
        margin-bottom: 4px;
      }

      .aircraft-chip {
        min-height: 22px;
      }

      .aircraft-metric {
        min-height: 24px;
      }

      .page-grid {
        min-width: 0;
        width: 100%;
      }

      .sheet-cell {
        min-height: 16px;
        font-size: 7px;
      }

      .time-subhead {
        font-size: 5.5px;
      }

      .flight-cell,
      .duty-cell,
      .tenth {
        min-height: 16px;
      }
    }

    @media (max-width: 1100px) {
      .aircraft-layout {
        grid-template-columns: 1fr;
      }

      .aircraft-left-spacer,
      .aircraft-right-spacer {
        display: none;
      }
    }

    @media (max-width: 900px) {
      .sheet-header {
        grid-template-columns: 1fr;
      }

      .sheet-title .form-title {
        font-size: 16px;
      }

      .aircraft-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="sheet-header">
      <div class="sheet-title">
        <div class="company">TEMSCO HELICOPTERS INC.</div>
        <div class="form-title">Pilot's Flight & Duty Time Log</div>
        <div class="note">Aircraft-linked PIC / NIGHT / TRNG totals are grouped under each aircraft header, like the scanned sheet. :contentReference[oaicite:0]{index=0}</div>
      </div>

      <div class="header-box">
        <div class="header-box-row">
          <div class="header-label">PILOT NAME</div>
          <div class="header-value">
            <input id="pilotName" type="text" placeholder="Pilot name" />
          </div>
        </div>
        <div class="header-box-row">
          <div class="header-label">PERIOD</div>
          <div class="header-value">
            <input id="logPeriod" type="text" placeholder="03/25/2026 to 03/31/2026" />
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="dutyBtn" class="duty-btn" type="button">Duty Mode</button>
      <button id="clearSelectedBtn" class="clear-btn" type="button">Clear Selected Aircraft</button>
      <button id="saveAllBtn" class="save-btn" type="button">Save 7 Days</button>
      <button id="loadSavedBtn" class="load-btn" type="button">Load Saved Rows</button>
    </div>

    <div class="mode-line">
      MODE: <span id="modeDisplay">FLIGHT</span> |
      CURRENT DAY: <span id="currentRowDisplay">1</span> |
      SELECTED AIRCRAFT: <span id="selectedAircraftDisplay">MD500</span>
    </div>

    <div class="aircraft-layout">
      <div class="aircraft-left-spacer"></div>
      <div id="aircraftBar" class="aircraft-bar"></div>
      <div class="aircraft-right-spacer"></div>
    </div>

    <div class="page-grid-wrap">
      <div id="pageGrid" class="page-grid"></div>
    </div>

    <div id="status" class="status"></div>

    <div class="saved-wrap">
      <div class="saved-title">Saved Entries</div>
      <div id="savedList"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient(
      "https://xjisftmfjsjomgsjzkod.supabase.co",
      "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
    );

    const DAY_COUNT = 7;

    const aircraftOptions = [
      { id: "md500",   label: "MD500",   color: "#22c55e" },
      { id: "as350",   label: "AS350",   color: "#3b82f6" },
      { id: "ec130",   label: "EC130",   color: "#14b8a6" },
      { id: "bell212", label: "BELL212", color: "#f59e0b" },
      { id: "bell214", label: "BELL214", color: "#8b5cf6" },
      { id: "bell205", label: "BELL205", color: "#ef4444" }
    ];

    let mode = "flight";
    let isDrawing = false;
    let currentRowId = 1;
    let rows = [];
    let selectedAircraftIndex = 0;

    const pageGrid = document.getElementById("pageGrid");
    const aircraftBar = document.getElementById("aircraftBar");
    const dutyBtn = document.getElementById("dutyBtn");
    const clearSelectedBtn = document.getElementById("clearSelectedBtn");
    const saveAllBtn = document.getElementById("saveAllBtn");
    const loadSavedBtn = document.getElementById("loadSavedBtn");
    const modeDisplay = document.getElementById("modeDisplay");
    const currentRowDisplay = document.getElementById("currentRowDisplay");
    const selectedAircraftDisplay = document.getElementById("selectedAircraftDisplay");
    const statusEl = document.getElementById("status");
    const savedList = document.getElementById("savedList");
    const logPeriodEl = document.getElementById("logPeriod");

    function getAircraftLabel(index) {
      const input = document.querySelector(`.aircraft-chip[data-aircraft-index="${index}"] input`);
      return input?.value.trim() || aircraftOptions[index].label;
    }

    function getAircraftColor(index) {
      return aircraftOptions[index]?.color || "#22c55e";
    }

    function getMetricInput(index, metric) {
      return document.querySelector(`.aircraft-metric[data-aircraft-index="${index}"][data-metric="${metric}"] input`);
    }

    function updateSelectedAircraftDisplay() {
      selectedAircraftDisplay.textContent = getAircraftLabel(selectedAircraftIndex);
    }

    function updateAircraftPicTotals() {
      const totals = new Array(aircraftOptions.length).fill(0);
      document.querySelectorAll(".tenth.on").forEach((el) => {
        const idx = Number(el.dataset.aircraftIndex ?? 0);
        if (idx >= 0 && idx < totals.length) totals[idx] += 0.1;
      });
      totals.forEach((total, index) => {
        const input = getMetricInput(index, "pic");
        if (input) input.value = total.toFixed(1);
      });
    }

    function buildAircraftBar() {
      aircraftBar.innerHTML = "";
      aircraftOptions.forEach((option, index) => {
        const stack = document.createElement("div");
        stack.className = "aircraft-stack";

        const chip = document.createElement("div");
        chip.className = "aircraft-chip";
        chip.dataset.aircraftIndex = index;
        chip.style.background = option.color;

        const input = document.createElement("input");
        input.type = "text";
        input.value = option.label;

        input.addEventListener("focus", () => {
          selectedAircraftIndex = index;
          refreshAircraftSelection();
          setMode("flight");
        });

        input.addEventListener("input", () => {
          updateSelectedAircraftDisplay();
        });

        chip.addEventListener("click", (e) => {
          if (e.target !== input) {
            selectedAircraftIndex = index;
            setMode("flight");
            refreshAircraftSelection();
          }
        });

        chip.appendChild(input);

        const metrics = document.createElement("div");
        metrics.className = "aircraft-metrics";

        ["pic", "night", "trng"].forEach((metric) => {
          const box = document.createElement("div");
          box.className = "aircraft-metric";
          box.dataset.aircraftIndex = index;
          box.dataset.metric = metric;
          box.innerHTML = `
            <div class="aircraft-metric-label">${metric.toUpperCase()}</div>
            <div class="aircraft-metric-value">
              <input type="text" value="${metric === "pic" ? "0.0" : ""}" ${metric === "pic" ? "readonly" : ""}>
            </div>
          `;
          metrics.appendChild(box);
        });

        stack.appendChild(chip);
        stack.appendChild(metrics);
        aircraftBar.appendChild(stack);
      });

      refreshAircraftSelection();
      updateAircraftPicTotals();
    }

    function refreshAircraftSelection() {
      document.querySelectorAll(".aircraft-chip").forEach((chip, index) => {
        chip.classList.toggle("selected", index === selectedAircraftIndex);
      });
      updateSelectedAircraftDisplay();
    }

    function setMode(newMode) {
      mode = newMode;
      modeDisplay.textContent = newMode.toUpperCase();
      dutyBtn.classList.toggle("active", newMode === "duty");
      clearSelectedBtn.textContent = newMode === "flight" ? "Clear Selected Aircraft" : "Clear Duty Row";
    }

    function setCurrentRow(rowId) {
      currentRowId = rowId;
      currentRowDisplay.textContent = rowId;
      document.querySelectorAll(".sheet-cell.row-label").forEach(el => {
        el.style.outline = "";
      });
      document.querySelectorAll(`.sheet-cell.row-label[data-row-id="${rowId}"]`).forEach(el => {
        el.style.outline = "1.5px solid #2563eb";
        el.style.outlineOffset = "-1px";
      });
    }

    function formatHalfHourBlock(blockIndex) {
      const hours = Math.floor(blockIndex / 2);
      const minutes = blockIndex % 2 === 0 ? "00" : "30";
      return `${String(hours).padStart(2, "0")}:${minutes}`;
    }

    function formatDateForRow(dateValue) {
      if (!dateValue) return "";
      if (/^\d{2}\/\d{2}$/.test(dateValue)) return dateValue;
      const parts = dateValue.split("-");
      if (parts.length === 3) return `${parts[1]}/${parts[2]}`;
      return dateValue;
    }

    function getPeriodYear() {
      const text = (logPeriodEl.value || "").trim();
      const yearMatch = text.match(/\b(20\d{2}|19\d{2})\b/);
      if (yearMatch) return yearMatch[1];
      return String(new Date().getFullYear());
    }

    function buildStoredDate(mmdd, periodValue) {
      const cleaned = (mmdd || "").trim();
      if (!/^\d{2}\/\d{2}$/.test(cleaned)) return cleaned;
      const yearMatch = (periodValue || "").match(/\b(20\d{2}|19\d{2})\b/);
      if (yearMatch) {
        const [mm, dd] = cleaned.split("/");
        return `${yearMatch[1]}-${mm}-${dd}`;
      }
      return cleaned;
    }

    function updatePeriodFromRows() {
      const firstDate = getInput(1, "logDate")?.value.trim() || "";
      const lastDate = getInput(DAY_COUNT, "logDate")?.value.trim() || "";
      if (/^\d{2}\/\d{2}$/.test(firstDate) && /^\d{2}\/\d{2}$/.test(lastDate)) {
        const year = getPeriodYear();
        logPeriodEl.value = `${firstDate}/${year} to ${lastDate}/${year}`;
      } else if (!firstDate && !lastDate && !/\bto\b/i.test(logPeriodEl.value)) {
        logPeriodEl.value = "";
      }
    }

    function autoFormatMMDDInput(input) {
      let value = input.value.replace(/[^\d]/g, "").slice(0, 4);
      if (value.length >= 3) value = value.slice(0, 2) + "/" + value.slice(2);
      input.value = value;
    }

    function makeEmptyRow(id) {
      return { id, dutyStartBlock: null };
    }

    function getRow(rowId) {
      return rows.find(r => r.id === rowId);
    }

    function createCell(className = "", text = "") {
      const div = document.createElement("div");
      div.className = `sheet-cell ${className}`.trim();
      div.textContent = text;
      return div;
    }

    function createInputCell(rowId, key, placeholder = "", maxLength = null, isTextarea = false, readOnly = false) {
      const div = document.createElement("div");
      div.className = "sheet-cell";
      div.dataset.rowId = rowId;
      div.dataset.key = key;

      const input = isTextarea ? document.createElement("textarea") : document.createElement("input");
      if (!isTextarea) input.type = "text";
      input.placeholder = placeholder;
      input.dataset.rowId = rowId;
      input.dataset.key = key;
      if (maxLength && !isTextarea) input.maxLength = maxLength;
      if (readOnly) input.readOnly = true;

      input.addEventListener("focus", () => setCurrentRow(rowId));

      if (key === "logDate") {
        input.addEventListener("input", () => {
          autoFormatMMDDInput(input);
          updatePeriodFromRows();
        });
      }

      div.appendChild(input);
      return div;
    }

    function createReadoutCell(rowId, key, initial = "") {
      const div = document.createElement("div");
      div.className = "sheet-cell readout";
      div.dataset.rowId = rowId;
      div.dataset.key = key;
      div.textContent = initial;
      return div;
    }

    function createFlightCell(rowId, blockIndex) {
      const cell = document.createElement("div");
      cell.className = "sheet-cell flight-cell";
      cell.dataset.rowId = rowId;
      cell.dataset.blockIndex = blockIndex;

      for (let j = 0; j < 5; j++) {
        const tenth = document.createElement("div");
        tenth.className = "tenth";
        tenth.dataset.rowId = rowId;
        tenth.dataset.block = blockIndex;
        tenth.dataset.tenth = j;

        tenth.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (mode !== "flight") return;
          setCurrentRow(rowId);
          isDrawing = true;
          paintFlight(tenth);
        });

        tenth.addEventListener("mouseenter", () => {
          if (isDrawing && mode === "flight" && Number(tenth.dataset.rowId) === currentRowId) {
            paintFlight(tenth);
          }
        });

        tenth.addEventListener("click", () => {
          if (mode !== "flight") return;
          setCurrentRow(rowId);
          paintFlight(tenth);
        });

        cell.appendChild(tenth);
      }

      return cell;
    }

    function createDutyCell(rowId, blockIndex) {
      const cell = document.createElement("div");
      cell.className = "sheet-cell duty-cell";
      cell.dataset.rowId = rowId;
      cell.dataset.block = blockIndex;

      cell.addEventListener("click", () => {
        if (mode !== "duty") return;
        setCurrentRow(rowId);
        handleDutyClick(cell);
      });

      return cell;
    }

    function getReadout(rowId, key) {
      return document.querySelector(`.sheet-cell.readout[data-row-id="${rowId}"][data-key="${key}"]`);
    }

    function getInput(rowId, key) {
      return document.querySelector(`[data-row-id="${rowId}"][data-key="${key}"] input, [data-row-id="${rowId}"][data-key="${key}"] textarea`);
    }

    function getDutyRange(rowId) {
      const activeBlocks = [];
      document.querySelectorAll(`.duty-cell[data-row-id="${rowId}"].on`).forEach((cell) => {
        activeBlocks.push(Number(cell.dataset.block));
      });

      if (activeBlocks.length === 0) return null;

      activeBlocks.sort((a, b) => a - b);

      const startBlock = activeBlocks[0];
      const lastBlock = activeBlocks[activeBlocks.length - 1];
      const stopBlockExclusive = lastBlock + 1;

      return {
        startBlock,
        stopBlockExclusive,
        startText: formatHalfHourBlock(startBlock),
        stopText: formatHalfHourBlock(stopBlockExclusive)
      };
    }

    function clearDutyPending(rowId) {
      document.querySelectorAll(`.duty-cell.pending[data-row-id="${rowId}"]`).forEach((el) => {
        el.classList.remove("pending");
      });
    }

    function setDutyPending(rowId, blockIndex) {
      clearDutyPending(rowId);
      const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${blockIndex}"]`);
      if (cell) cell.classList.add("pending");
    }

    function clearDutyOnly(rowId) {
      document.querySelectorAll(`.duty-cell[data-row-id="${rowId}"].on`).forEach((el) => el.classList.remove("on"));
      clearDutyPending(rowId);
      const row = getRow(rowId);
      if (row) row.dutyStartBlock = null;
      updateTotals(rowId);
    }

    function clearSelectedAircraftOnly(rowId) {
      document.querySelectorAll(`.tenth.on[data-row-id="${rowId}"]`).forEach((el) => {
        const idx = Number(el.dataset.aircraftIndex ?? -1);
        if (idx === selectedAircraftIndex) {
          el.classList.remove("on");
          el.style.background = "";
          delete el.dataset.aircraftIndex;
        }
      });
      updateTotals(rowId);
      updateAircraftPicTotals();
    }

    function clearSelectedModeForCurrentRow() {
      if (mode === "flight") {
        clearSelectedAircraftOnly(currentRowId);
        statusEl.textContent = `Day ${currentRowId}: cleared ${getAircraftLabel(selectedAircraftIndex)} only.`;
      } else {
        clearDutyOnly(currentRowId);
        statusEl.textContent = `Day ${currentRowId}: duty row cleared.`;
      }
    }

    function fillDutyRange(rowId, startBlock, stopBlock) {
      const start = Math.min(startBlock, stopBlock);
      const end = Math.max(startBlock, stopBlock);

      clearDutyOnly(rowId);

      for (let i = start; i <= end; i++) {
        const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${i}"]`);
        if (cell) cell.classList.add("on");
      }

      updateTotals(rowId);
    }

    function handleDutyClick(cell) {
      const rowId = Number(cell.dataset.rowId);
      const row = getRow(rowId);
      if (!row) return;

      const block = Number(cell.dataset.block);

      if (row.dutyStartBlock === null) {
        clearDutyOnly(rowId);
        row.dutyStartBlock = block;
        setDutyPending(rowId, block);
        updateTotals(rowId);
        statusEl.textContent = `Day ${rowId}: duty start set. Click stop time.`;
        return;
      }

      fillDutyRange(rowId, row.dutyStartBlock, block);
      row.dutyStartBlock = null;
      clearDutyPending(rowId);
      statusEl.textContent = `Day ${rowId}: duty range filled.`;
    }

    function paintFlight(tenth) {
      if (mode !== "flight") return;
      tenth.classList.add("on");
      tenth.dataset.aircraftIndex = String(selectedAircraftIndex);
      tenth.style.background = getAircraftColor(selectedAircraftIndex);
      updateTotals(Number(tenth.dataset.rowId));
      updateAircraftPicTotals();
    }

    function updateTotals(rowId) {
      let flight = 0;
      let duty = 0;

      document.querySelectorAll(`.tenth.on[data-row-id="${rowId}"]`).forEach(() => {
        flight += 0.1;
      });

      document.querySelectorAll(`.duty-cell.on[data-row-id="${rowId}"]`).forEach(() => {
        duty += 0.5;
      });

      const dutyRange = getDutyRange(rowId);

      getReadout(rowId, "flightTotal").textContent = flight.toFixed(1);
      getReadout(rowId, "dutyTotal").textContent = duty.toFixed(1);
      getReadout(rowId, "dutyStart").textContent = dutyRange ? dutyRange.startText : "--:--";
      getReadout(rowId, "dutyStop").textContent = dutyRange ? dutyRange.stopText : "--:--";
    }

    function getFlightBlocks(rowId) {
      const blocks = [];
      for (let i = 0; i < 48; i++) {
        let count = 0;
        document.querySelectorAll(`.tenth[data-row-id="${rowId}"][data-block="${i}"].on`).forEach(() => {
          count += 1;
        });
        blocks.push(Number((count * 0.1).toFixed(1)));
      }
      return blocks;
    }

    function getFlightMarks(rowId) {
      const marks = [];
      for (let i = 0; i < 48; i++) {
        const blockMarks = [];
        for (let j = 0; j < 5; j++) {
          const tenth = document.querySelector(`.tenth[data-row-id="${rowId}"][data-block="${i}"][data-tenth="${j}"]`);
          blockMarks.push(tenth?.classList.contains("on") ? Number(tenth.dataset.aircraftIndex ?? 0) : null);
        }
        marks.push(blockMarks);
      }
      return marks;
    }

    function getUsedAircraftNames(rowId) {
      const used = new Set();
      document.querySelectorAll(`.tenth.on[data-row-id="${rowId}"]`).forEach((el) => {
        const idx = Number(el.dataset.aircraftIndex ?? 0);
        used.add(getAircraftLabel(idx));
      });
      return Array.from(used);
    }

    function getDutyBlocks(rowId) {
      const blocks = [];
      for (let i = 0; i < 48; i++) {
        const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${i}"]`);
        blocks.push(cell && cell.classList.contains("on") ? 0.5 : 0);
      }
      return blocks;
    }

    function clearEntireDay(rowId) {
      document.querySelectorAll(`.tenth[data-row-id="${rowId}"]`).forEach((el) => {
        el.classList.remove("on");
        el.style.background = "";
        delete el.dataset.aircraftIndex;
      });
      clearDutyOnly(rowId);

      ["logDate", "landings", "route", "remarks"].forEach(key => {
        const input = getInput(rowId, key);
        if (input) input.value = "";
      });

      updateTotals(rowId);
      updateAircraftPicTotals();
      updatePeriodFromRows();
    }

    function applyFlightMarksToRow(rowId, flightMarks, fallbackFlightBlocks) {
      document.querySelectorAll(`.tenth[data-row-id="${rowId}"]`).forEach((el) => {
        el.classList.remove("on");
        el.style.background = "";
        delete el.dataset.aircraftIndex;
      });

      if (Array.isArray(flightMarks) && flightMarks.length) {
        flightMarks.forEach((blockMarks, blockIndex) => {
          if (!Array.isArray(blockMarks)) return;
          blockMarks.forEach((aircraftIndex, tenthIndex) => {
            if (aircraftIndex === null || aircraftIndex === undefined) return;
            const tenth = document.querySelector(`.tenth[data-row-id="${rowId}"][data-block="${blockIndex}"][data-tenth="${tenthIndex}"]`);
            if (tenth) {
              const idx = Number(aircraftIndex) || 0;
              tenth.classList.add("on");
              tenth.dataset.aircraftIndex = String(idx);
              tenth.style.background = getAircraftColor(idx);
            }
          });
        });
        updateAircraftPicTotals();
        return;
      }

      if (Array.isArray(fallbackFlightBlocks)) {
        fallbackFlightBlocks.forEach((value, blockIndex) => {
          const tenthsToFill = Math.round((Number(value) || 0) * 10);
          for (let i = 0; i < tenthsToFill; i++) {
            const tenth = document.querySelector(`.tenth[data-row-id="${rowId}"][data-block="${blockIndex}"][data-tenth="${i}"]`);
            if (tenth) {
              tenth.classList.add("on");
              tenth.dataset.aircraftIndex = "0";
              tenth.style.background = getAircraftColor(0);
            }
          }
        });
      }

      updateAircraftPicTotals();
    }

    function loadDayFromData(rowId, entry) {
      clearEntireDay(rowId);

      const dateInput = getInput(rowId, "logDate");
      const landingsInput = getInput(rowId, "landings");
      const routeInput = getInput(rowId, "route");
      const remarksInput = getInput(rowId, "remarks");

      if (dateInput) dateInput.value = formatDateForRow(entry.log_date) || "";
      if (landingsInput) landingsInput.value = entry.landings || "";
      if (routeInput) routeInput.value = entry.route || "";
      if (remarksInput) remarksInput.value = entry.remarks || "";

      applyFlightMarksToRow(rowId, entry.flight_marks, entry.flight_blocks);

      if (Array.isArray(entry.duty_blocks)) {
        entry.duty_blocks.forEach((value, blockIndex) => {
          if (Number(value) > 0) {
            const cell = document.querySelector(`.duty-cell[data-row-id="${rowId}"][data-block="${blockIndex}"]`);
            if (cell) cell.classList.add("on");
          }
        });
      }

      const row = getRow(rowId);
      if (row) row.dutyStartBlock = null;

      clearDutyPending(rowId);
      updateTotals(rowId);
      updatePeriodFromRows();
      updateAircraftPicTotals();
    }

    function addDay(rowId) {
      const dateCell = createInputCell(rowId, "logDate", "MM/DD", 5);
      dateCell.style.gridRow = "span 2";
      pageGrid.appendChild(dateCell);

      const dutyStartCell = createReadoutCell(rowId, "dutyStart", "--:--");
      dutyStartCell.style.gridRow = "span 2";
      pageGrid.appendChild(dutyStartCell);

      const dutyStopCell = createReadoutCell(rowId, "dutyStop", "--:--");
      dutyStopCell.style.gridRow = "span 2";
      pageGrid.appendChild(dutyStopCell);

      const dutyTotalCell = createReadoutCell(rowId, "dutyTotal", "0.0");
      dutyTotalCell.style.gridRow = "span 2";
      pageGrid.appendChild(dutyTotalCell);

      const flightTotalCell = createReadoutCell(rowId, "flightTotal", "0.0");
      flightTotalCell.style.gridRow = "span 2";
      pageGrid.appendChild(flightTotalCell);

      const flightLabel = createCell("row-label", "FLT");
      flightLabel.dataset.rowId = rowId;
      flightLabel.addEventListener("click", () => setCurrentRow(rowId));
      pageGrid.appendChild(flightLabel);

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createFlightCell(rowId, i));
      }

      const landingsCell = createInputCell(rowId, "landings", "", 4);
      landingsCell.style.gridRow = "span 2";
      pageGrid.appendChild(landingsCell);

      const routeCell = createInputCell(rowId, "route", "");
      routeCell.style.gridRow = "span 2";
      pageGrid.appendChild(routeCell);

      const remarksCell = createInputCell(rowId, "remarks", "", null, true);
      remarksCell.style.gridRow = "span 2";
      pageGrid.appendChild(remarksCell);

      const dutyLabel = createCell("row-label", "DUTY");
      dutyLabel.dataset.rowId = rowId;
      dutyLabel.addEventListener("click", () => setCurrentRow(rowId));
      pageGrid.appendChild(dutyLabel);

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createDutyCell(rowId, i));
      }
    }

    function buildPage() {
      pageGrid.innerHTML = "";
      rows = [];

      pageGrid.appendChild(createCell("header", "DATE"));
      pageGrid.appendChild(createCell("header", "START"));
      pageGrid.appendChild(createCell("header", "STOP"));
      pageGrid.appendChild(createCell("header", "DUTY"));
      pageGrid.appendChild(createCell("header", "FLT"));
      pageGrid.appendChild(createCell("header", "I"));

      for (let i = 0; i < 48; i++) {
        pageGrid.appendChild(createCell("header", i === 0 ? "TIME" : ""));
      }

      pageGrid.appendChild(createCell("header", "LDGS"));
      pageGrid.appendChild(createCell("header", "ROUTE"));
      pageGrid.appendChild(createCell("header", "REMARKS"));

      pageGrid.appendChild(createCell("subhead", "MM/DD"));
      pageGrid.appendChild(createCell("subhead", "Start"));
      pageGrid.appendChild(createCell("subhead", "Stop"));
      pageGrid.appendChild(createCell("subhead", "Duty"));
      pageGrid.appendChild(createCell("subhead", "Flt"));
      pageGrid.appendChild(createCell("subhead", "ROW"));

      for (let i = 0; i < 48; i++) {
        const text = i % 2 === 0 ? String(i / 2) : "";
        pageGrid.appendChild(createCell("time-subhead", text));
      }

      pageGrid.appendChild(createCell("subhead", "No."));
      pageGrid.appendChild(createCell("subhead", "From/To"));
      pageGrid.appendChild(createCell("subhead", "Notes"));

      for (let i = 1; i <= DAY_COUNT; i++) {
        const row = makeEmptyRow(i);
        rows.push(row);
        addDay(i);
      }

      setCurrentRow(1);
      setMode("flight");
    }

    async function getCurrentUser() {
      const { data, error } = await sb.auth.getSession();
      if (error) {
        console.error("Session error:", error);
        return null;
      }
      return data.session?.user ?? null;
    }

    function collectPayloads(userId) {
      const pilotName = document.getElementById("pilotName").value.trim();
      const logPeriod = document.getElementById("logPeriod").value.trim();
      const payloads = [];

      for (const row of rows) {
        const rowId = row.id;
        const logDateRaw = getInput(rowId, "logDate")?.value.trim() || "";
        const landings = getInput(rowId, "landings")?.value.trim() || "";
        const route = getInput(rowId, "route")?.value.trim() || "";
        const remarks = getInput(rowId, "remarks")?.value.trim() || "";

        const flightBlocks = getFlightBlocks(rowId);
        const flightMarks = getFlightMarks(rowId);
        const usedAircraft = getUsedAircraftNames(rowId);
        const dutyBlocks = getDutyBlocks(rowId);
        const flightTotal = Number(getReadout(rowId, "flightTotal").textContent || "0");
        const dutyTotal = Number(getReadout(rowId, "dutyTotal").textContent || "0");
        const dutyRange = getDutyRange(rowId);

        const hasAnyData =
          logDateRaw ||
          landings ||
          route ||
          remarks ||
          flightTotal > 0 ||
          dutyTotal > 0;

        if (!hasAnyData) continue;

        if (!/^\d{2}\/\d{2}$/.test(logDateRaw)) {
          throw new Error(`Day ${rowId}: enter date as MM/DD.`);
        }

        if (flightTotal > 0 && usedAircraft.length === 0) {
          throw new Error(`Day ${rowId}: select an aircraft and paint flight time.`);
        }

        if (flightTotal > dutyTotal) {
          throw new Error(`Day ${rowId}: flight cannot exceed duty.`);
        }

        if (dutyTotal > 14) {
          throw new Error(`Day ${rowId}: duty exceeds 14 hours.`);
        }

        payloads.push({
          log_date: buildStoredDate(logDateRaw, logPeriod),
          aircraft_name: usedAircraft.join(", ") || null,
          flight_blocks: flightBlocks,
          flight_marks: flightMarks,
          duty_blocks: dutyBlocks,
          flt1: flightTotal,
          duty: dutyTotal,
          duty_start: dutyRange ? dutyRange.startText : null,
          duty_stop: dutyRange ? dutyRange.stopText : null,
          pilot_name: pilotName || null,
          period: logPeriod || null,
          landings: landings || null,
          route: route || null,
          remarks: remarks || null,
          user_id: userId
        });
      }

      return payloads;
    }

    function stripOptionalFields(payloads) {
      return payloads.map(p => {
        const { landings, route, remarks, flight_marks, ...rest } = p;
        return rest;
      });
    }

    async function saveAllRows() {
      statusEl.textContent = "";

      const user = await getCurrentUser();
      if (!user) {
        statusEl.textContent = "Not logged in. Please sign in first.";
        return;
      }

      let payloads;
      try {
        payloads = collectPayloads(user.id);
      } catch (err) {
        statusEl.textContent = err.message;
        return;
      }

      if (payloads.length === 0) {
        statusEl.textContent = "No filled days to save.";
        return;
      }

      let result = await sb.from("logs").insert(payloads);

      if (result.error && /column .* does not exist|schema cache/i.test(result.error.message)) {
        result = await sb.from("logs").insert(stripOptionalFields(payloads));
        if (!result.error) {
          statusEl.textContent = `Saved ${payloads.length} day(s). Some optional fields may not persist yet because one or more DB columns are missing.`;
          await loadSavedEntries();
          return;
        }
      }

      if (result.error) {
        statusEl.textContent = result.error.message;
        console.error("Insert error:", result.error);
        return;
      }

      statusEl.textContent = `Saved ${payloads.length} day(s).`;
      await loadSavedEntries();
    }

    async function loadSavedEntries() {
      const user = await getCurrentUser();

      if (!user) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">No user session.</div></div>`;
        return;
      }

      let query = await sb
        .from("logs")
        .select("id, log_date, aircraft_name, flt1, duty, duty_start, duty_stop, pilot_name, period, landings, route, remarks, flight_blocks, flight_marks, duty_blocks")
        .eq("user_id", user.id)
        .order("id", { ascending: false });

      if (query.error && /column .* does not exist|schema cache/i.test(query.error.message)) {
        query = await sb
          .from("logs")
          .select("id, log_date, aircraft_name, flt1, duty, duty_start, duty_stop, pilot_name, period, flight_blocks, duty_blocks")
          .eq("user_id", user.id)
          .order("id", { ascending: false });
      }

      if (query.error) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">${query.error.message}</div></div>`;
        console.error("Load error:", query.error);
        return;
      }

      const data = query.data || [];

      if (data.length === 0) {
        savedList.innerHTML = `<div class="saved-row"><div class="saved-meta">No saved entries yet.</div></div>`;
        return;
      }

      savedList.innerHTML = "";

      data.slice(0, 14).forEach((entry) => {
        const row = document.createElement("div");
        row.className = "saved-row";

        row.innerHTML = `
          <div class="saved-meta">
            <strong>${formatDateForRow(entry.log_date) || "-"}</strong> |
            A/C ${entry.aircraft_name || "-"} |
            DUTY ${entry.duty_start || "--:--"}-${entry.duty_stop || "--:--"} |
            DUTY ${Number(entry.duty || 0).toFixed(1)} |
            FLT ${Number(entry.flt1 || 0).toFixed(1)}
            ${entry.landings ? `| LDGS ${entry.landings}` : ""}
            ${entry.route ? `| ROUTE ${entry.route}` : ""}
            ${entry.remarks ? `| ${entry.remarks}` : ""}
          </div>
          <div class="saved-actions"></div>
        `;

        const actions = row.querySelector(".saved-actions");

        const loadBtn = document.createElement("button");
        loadBtn.type = "button";
        loadBtn.className = "load-btn";
        loadBtn.textContent = "Load to Day";
        loadBtn.onclick = () => {
          loadDayFromData(currentRowId, entry);
          document.getElementById("pilotName").value = entry.pilot_name || "";
          document.getElementById("logPeriod").value = entry.period || "";
          statusEl.textContent = `Loaded saved entry into day ${currentRowId}.`;
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = async () => {
          const { error } = await sb.from("logs").delete().eq("id", entry.id);
          if (error) {
            statusEl.textContent = error.message;
            return;
          }
          statusEl.textContent = "Entry deleted.";
          await loadSavedEntries();
        };

        actions.appendChild(loadBtn);
        actions.appendChild(deleteBtn);
        savedList.appendChild(row);
      });
    }

    document.addEventListener("mouseup", () => {
      isDrawing = false;
    });

    dutyBtn.addEventListener("click", () => setMode("duty"));
    clearSelectedBtn.addEventListener("click", clearSelectedModeForCurrentRow);
    saveAllBtn.addEventListener("click", saveAllRows);
    loadSavedBtn.addEventListener("click", loadSavedEntries);

    buildAircraftBar();
    buildPage();
    updatePeriodFromRows();
    updateAircraftPicTotals();
    loadSavedEntries();
  </script>
</body>
</html>
