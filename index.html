<!DOCTYPE html>
<html>
<head>
  <title>Pilot Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .save-btn {
      background: #22c55e;
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    .edit-btn {
      background: #3b82f6;
      color: white;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background: #0f172a;
      padding: 8px;
      text-align: left;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #475569;
    }

    tr:hover {
      background: #475569;
    }

    .total {
      margin-top: 15px;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Pilot Dashboard</h1>

    <h3>Add Flight Log</h3>

    <input id="date" type="date">
    <input id="aircraft" placeholder="Aircraft">
    <input id="hours" placeholder="Flight Hours">

    <button class="save-btn" onclick="addLog()">Save Flight</button>

    <p id="status"></p>

    <h3>Saved Flights</h3>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Aircraft</th>
          <th>Hours</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="logList"></tbody>
    </table>

    <div class="total">
      Total Hours: <span id="totalHours">0</span>
    </div>

  </div>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
  window.addEventListener("load", () => {

    const sb = window.supabase.createClient(
      "https://xjisftmfjsjomgsjzkod.supabase.co",
      "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
    );

    // LOAD LOGS
    window.loadLogs = async function () {
      const { data: userData } = await sb.auth.getUser();
      const user = userData.user;

      const { data } = await sb
        .from("logs")
        .select("*")
        .eq("user_id", user.id);

      const list = document.getElementById("logList");
      const totalDisplay = document.getElementById("totalHours");

      list.innerHTML = "";
      let total = 0;

      if (data) {
        data.forEach(log => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${log.date}</td>
            <td>${log.aircraft}</td>
            <td>${log.hours}</td>
            <td></td>
          `;

          const actionsCell = row.children[3];

          const editBtn = document.createElement("button");
          editBtn.textContent = "Edit";
          editBtn.className = "edit-btn";
          editBtn.onclick = () => window.editLog(log);

          const deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.className = "delete-btn";
          deleteBtn.onclick = () => window.deleteLog(log.id);

          actionsCell.appendChild(editBtn);
          actionsCell.appendChild(deleteBtn);

          list.appendChild(row);

          const hoursNum = parseFloat(log.hours);
          if (!isNaN(hoursNum)) total += hoursNum;
        });
      }

      totalDisplay.innerText = total.toFixed(1);
    };

    // ADD LOG
    window.addLog = async function () {
      const date = document.getElementById("date").value;
      const aircraft = document.getElementById("aircraft").value;
      const hours = document.getElementById("hours").value;

      const { data: userData } = await sb.auth.getUser();
      const user = userData.user;

      const { error } = await sb
        .from("logs")
        .insert([{
          date,
          aircraft,
          hours,
          user_id: user.id
        }]);

      if (error) {
        document.getElementById("status").innerText = error.message;
      } else {
        document.getElementById("status").innerText = "Flight saved!";
        window.loadLogs();
      }
    };

    // DELETE
    window.deleteLog = async function (id) {
      const { error } = await sb
        .from("logs")
        .delete()
        .eq("id", id);

      if (error) {
        alert(error.message);
      } else {
        window.loadLogs();
      }
    };

    // EDIT
    window.editLog = function (log) {
      const newDate = prompt("Edit date:", log.date);
      const newAircraft = prompt("Edit aircraft:", log.aircraft);
      const newHours = prompt("Edit hours:", log.hours);

      if (!newDate || !newAircraft || !newHours) return;

      window.updateLog(log.id, newDate, newAircraft, newHours);
    };

    // UPDATE
    window.updateLog = async function (id, date, aircraft, hours) {
      const { error } = await sb
        .from("logs")
        .update({ date, aircraft, hours })
        .eq("id", id);

      if (error) {
        alert(error.message);
      } else {
        window.loadLogs();
      }
    };

    // INITIAL LOAD
    window.loadLogs();

  });
  </script>

</body>
</html>
