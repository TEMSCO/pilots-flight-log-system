<!DOCTYPE html>
<html>
<head>
  <title>Pilot Logbook Replica</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .timeline {
      display: grid;
      grid-template-columns: 80px repeat(24, 1fr);
      gap: 2px;
      margin-bottom: 10px;
      font-size: 10px;
      text-align: center;
    }

    .timeline div {
      background: #1e293b;
      padding: 4px;
      border-radius: 2px;
    }

    .row {
      display: grid;
      grid-template-columns: 80px 1fr;
      margin-bottom: 10px;
      align-items: center;
    }

    .label {
      font-weight: bold;
    }

    .slider {
      width: 100%;
    }

    .flight {
      accent-color: #22c55e;
    }

    .duty {
      accent-color: #facc15;
    }

    input {
      padding: 6px;
      border-radius: 5px;
      border: none;
      margin: 5px;
    }

    .top-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      width: 100%;
      cursor: pointer;
    }

    .log {
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>✈️ Flight & Duty Log (Replica B2)</h2>

<!-- START / STOP -->
<div class="top-row">
  <input id="start" type="time">
  <input id="stop" type="time">
  <input id="aircraft" placeholder="Aircraft">
</div>

<!-- TIMELINE HEADER -->
<div class="timeline">
  <div></div>
  <script>
    for (let i = 1; i <= 24; i++) {
      document.write("<div>" + i + "</div>");
    }
  </script>
</div>

<!-- FLIGHT ROW -->
<div class="row">
  <div class="label">FLT</div>
  <input type="range" min="0" max="14" step="0.1" id="flightSlider" class="slider flight">
</div>

<!-- DUTY ROW -->
<div class="row">
  <div class="label">DUTY</div>
  <input type="range" min="0" max="14" step="0.1" id="dutySlider" class="slider duty">
</div>

<div class="row">
  <div class="label">Duty Total</div>
  <div id="dutyTotal">0.0</div>
</div>

<button onclick="saveLog()">Save Entry</button>

<div class="log" id="logList"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://xjisftmfjsjomgsjzkod.supabase.co",
  "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
);

// CALCULATE DUTY
function calculateDuty() {
  const start = startInput.value;
  const stop = stopInput.value;

  if (!start || !stop) return;

  const s = new Date("1970-01-01T" + start);
  const e = new Date("1970-01-01T" + stop);

  let diff = (e - s) / 3600000;
  if (diff < 0) diff += 24;

  if (diff > 14) {
    alert("⚠️ Max duty is 14 hours");
    diff = 14;
  }

  dutyTotal.innerText = diff.toFixed(1);
  dutySlider.value = diff;

  // lock flight slider
  flightSlider.max = diff;
  if (flightSlider.value > diff) {
    flightSlider.value = diff;
  }
}

const startInput = document.getElementById("start");
const stopInput = document.getElementById("stop");
const dutyTotal = document.getElementById("dutyTotal");
const flightSlider = document.getElementById("flightSlider");
const dutySlider = document.getElementById("dutySlider");

startInput.onchange = calculateDuty;
stopInput.onchange = calculateDuty;

// SAVE
async function saveLog() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const duty = parseFloat(dutyTotal.innerText);
  const flight = parseFloat(flightSlider.value);

  if (flight > duty) {
    alert("Flight cannot exceed duty");
    return;
  }

  const { error } = await sb.from("logs").insert([{
    start: startInput.value,
    stop: stopInput.value,
    aircraft1: aircraft.value,
    flt1: flight,
    duty: duty,
    user_id: user.id
  }]);

  if (error) alert(error.message);
  else loadLogs();
}

// LOAD
async function loadLogs() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const { data } = await sb
    .from("logs")
    .select("*")
    .eq("user_id", user.id)
    .order("id", { ascending: false });

  logList.innerHTML = "";

  if (data) {
    data.forEach(log => {
      logList.innerHTML += `
        <div>
          ${log.start}-${log.stop} |
          FLT: ${log.flt1} |
          DUTY: ${log.duty}
        </div>
      `;
    });
  }
}

loadLogs();
</script>

</body>
</html>
