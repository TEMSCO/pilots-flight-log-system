<!DOCTYPE html>
<html>
<head>
  <title>Pilot Logbook FAA Replica</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: 100px repeat(3, 1fr) 120px;
      gap: 5px;
      align-items: center;
      margin-bottom: 10px;
    }

    .label { font-weight: bold; }

    input {
      padding: 6px;
      border-radius: 5px;
      border: none;
      width: 100%;
    }

    .slider {
      width: 100%;
    }

    .flight-slider {
      accent-color: #22c55e;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .log {
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>✈️ Flight & Duty Log (FAA Replica)</h2>

<!-- HEADER ROW -->
<div class="grid">
  <div class="label">Start</div>
  <input id="start" type="time">

  <input id="aircraft1" placeholder="Aircraft 1">
  <input id="aircraft2" placeholder="Aircraft 2">
  <input id="aircraft3" placeholder="Aircraft 3">

  <div class="label">Stop</div>
  <input id="stop" type="time">
</div>

<!-- FLIGHT ROW -->
<div class="grid">
  <div class="label">FLT</div>

  <input type="range" min="0" max="14" step="0.1" id="flt1" class="slider flight-slider">
  <input type="range" min="0" max="14" step="0.1" id="flt2" class="slider flight-slider">
  <input type="range" min="0" max="14" step="0.1" id="flt3" class="slider flight-slider">

  <div></div>
</div>

<!-- DUTY DISPLAY -->
<div class="grid">
  <div class="label">Duty Total</div>
  <div id="dutyTotal">0.0</div>
</div>

<button onclick="saveLog()">Save Entry</button>

<div class="log" id="logList"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://xjisftmfjsjomgsjzkod.supabase.co",
  "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
);

// ✈️ CALCULATE DUTY
function calculateDuty() {
  const start = document.getElementById("start").value;
  const stop = document.getElementById("stop").value;

  if (!start || !stop) return;

  const s = new Date("1970-01-01T" + start);
  const e = new Date("1970-01-01T" + stop);

  let diff = (e - s) / 3600000;
  if (diff < 0) diff += 24;

  // FAA LIMIT
  if (diff > 14) {
    alert("⚠️ Duty exceeds 14-hour FAA limit");
    diff = 14;
  }

  document.getElementById("dutyTotal").innerText = diff.toFixed(1);

  // LOCK FLIGHT SLIDERS
  ["flt1","flt2","flt3"].forEach(id => {
    const slider = document.getElementById(id);
    slider.max = diff;

    if (parseFloat(slider.value) > diff) {
      slider.value = diff;
    }
  });
}

document.getElementById("start").onchange = calculateDuty;
document.getElementById("stop").onchange = calculateDuty;

// 💾 SAVE
async function saveLog() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const duty = parseFloat(document.getElementById("dutyTotal").innerText);

  const totalFlight =
    parseFloat(flt1.value || 0) +
    parseFloat(flt2.value || 0) +
    parseFloat(flt3.value || 0);

  // VALIDATION
  if (totalFlight > duty) {
    alert("⚠️ Flight time cannot exceed duty time");
    return;
  }

  const entry = {
    start: start.value,
    stop: stop.value,
    aircraft1: aircraft1.value,
    aircraft2: aircraft2.value,
    aircraft3: aircraft3.value,
    flt1: flt1.value,
    flt2: flt2.value,
    flt3: flt3.value,
    duty: duty,
    user_id: user.id
  };

  const { error } = await sb.from("logs").insert([entry]);

  if (error) {
    alert(error.message);
  } else {
    loadLogs();
  }
}

// 📄 LOAD
async function loadLogs() {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const { data } = await sb
    .from("logs")
    .select("*")
    .eq("user_id", user.id)
    .order("id", { ascending: false });

  const list = document.getElementById("logList");
  list.innerHTML = "";

  if (data) {
    data.forEach(log => {
      list.innerHTML += `
        <div>
          ${log.start} - ${log.stop} |
          FLT: ${log.flt1}/${log.flt2}/${log.flt3} |
          DUTY: ${log.duty}
        </div>
      `;
    });
  }
}

loadLogs();
</script>

</body>
</html>
