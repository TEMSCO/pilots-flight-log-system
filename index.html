<!DOCTYPE html>
<html>
<head>
  <title>Flight Log - Guaranteed Fix</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .flight-btn { background: #22c55e; }
    .duty-btn { background: #facc15; color: black; }
    .active { outline: 3px solid white; }

    .grid {
      display: grid;
      grid-template-columns: 80px repeat(48, 1fr);
      gap: 2px;
    }

    .cell {
      height: 25px;
      background: #1e293b;
      cursor: pointer;
    }

    .header {
      font-size: 10px;
      text-align: center;
      background: #334155;
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .flight { background: #22c55e; }
    .duty { background: #facc15; }
  </style>
</head>

<body>

<h2>✈️ Flight & Duty Log</h2>

<div class="controls">
  <button id="flightBtn" class="flight-btn active">Flight Mode</button>
  <button id="dutyBtn" class="duty-btn">Duty Mode</button>
</div>

<div id="modeDisplay">Mode: flight</div>

<div class="grid" id="grid"></div>

<script>
let mode = "flight";
let isDrawing = false;

const grid = document.getElementById("grid");

// MODE BUTTONS
flightBtn.onclick = () => {
  mode = "flight";
  modeDisplay.innerText = "Mode: flight";
  flightBtn.classList.add("active");
  dutyBtn.classList.remove("active");
};

dutyBtn.onclick = () => {
  mode = "duty";
  modeDisplay.innerText = "Mode: duty";
  dutyBtn.classList.add("active");
  flightBtn.classList.remove("active");
};

// HEADER
grid.innerHTML += "<div></div>";
for (let i = 0; i < 48; i++) {
  grid.innerHTML += `<div class="header">${i % 2 === 0 ? i/2 : ""}</div>`;
}

// ROWS
["flight", "duty"].forEach(type => {
  grid.innerHTML += `<div class="label">${type.toUpperCase()}</div>`;

  for (let i = 0; i < 48; i++) {
    const cell = document.createElement("div");

    cell.className = "cell";
    cell.dataset.row = type;

    // ✅ POINTER EVENTS (KEY FIX)
    cell.addEventListener("pointerdown", () => {
      isDrawing = true;
      paint(cell);
    });

    cell.addEventListener("pointerenter", () => {
      if (isDrawing) paint(cell);
    });

    grid.appendChild(cell);
  }
});

// STOP DRAW
document.addEventListener("pointerup", () => {
  isDrawing = false;
});

// PAINT
function paint(cell) {
  if (cell.dataset.row !== mode) return;

  cell.classList.add(mode);
}
</script>

</body>
</html>
