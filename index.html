<!DOCTYPE html>
<html>
<head>
  <title>Flight & Duty Log</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .flight-btn { background: #22c55e; color: white; }
    .duty-btn { background: #facc15; color: black; }
    .clear-btn { background: #ef4444; color: white; }

    .active {
      outline: 3px solid white;
    }

    .mode {
      margin-bottom: 12px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 80px repeat(48, 1fr);
      border-top: 1px solid #475569;
      border-left: 1px solid #475569;
      user-select: none;
    }

    .header,
    .label,
    .duty-cell,
    .flight-cell {
      border-right: 1px solid #475569;
      border-bottom: 1px solid #475569;
    }

    .header {
      background: #334155;
      text-align: center;
      font-size: 10px;
      padding: 4px 0;
      min-width: 24px;
    }

    .label {
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      min-height: 28px;
    }

    /* Duty = half-hour blocks */
    .duty-cell {
      background: #1e293b;
      height: 28px;
      cursor: pointer;
    }

    .duty-cell.on {
      background: #facc15;
    }

    /* Flight = each half-hour block split into 5 tenths */
    .flight-cell {
      height: 28px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: #1e293b;
    }

    .tenth {
      border-right: 1px solid #334155;
      cursor: pointer;
      background: #1e293b;
    }

    .tenth:last-child {
      border-right: none;
    }

    .tenth.on {
      background: #22c55e;
    }

    .totals {
      margin-top: 14px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>✈️ Flight & Duty Log</h2>

  <div class="controls">
    <button id="flightBtn" class="flight-btn active" type="button">Flight Mode</button>
    <button id="dutyBtn" class="duty-btn" type="button">Duty Mode</button>
    <button id="clearBtn" class="clear-btn" type="button">Clear</button>
  </div>

  <div class="mode">Mode: <span id="modeDisplay">FLIGHT</span></div>

  <div id="grid" class="grid"></div>

  <div class="totals">
    Flight: <span id="flightTotal">0.0</span> hrs |
    Duty: <span id="dutyTotal">0.0</span> hrs
  </div>

  <script>
    let mode = "flight";
    let isDrawing = false;

    const grid = document.getElementById("grid");
    const flightBtn = document.getElementById("flightBtn");
    const dutyBtn = document.getElementById("dutyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const modeDisplay = document.getElementById("modeDisplay");
    const flightTotalEl = document.getElementById("flightTotal");
    const dutyTotalEl = document.getElementById("dutyTotal");

    function setMode(newMode) {
      mode = newMode;
      modeDisplay.textContent = newMode.toUpperCase();
      flightBtn.classList.toggle("active", newMode === "flight");
      dutyBtn.classList.toggle("active", newMode === "duty");
    }

    function buildGrid() {
      grid.innerHTML = "";

      const blank = document.createElement("div");
      blank.className = "header";
      grid.appendChild(blank);

      for (let i = 0; i < 48; i++) {
        const h = document.createElement("div");
        h.className = "header";
        h.textContent = i % 2 === 0 ? String(i / 2) : "";
        grid.appendChild(h);
      }

      // Flight row
      const flightLabel = document.createElement("div");
      flightLabel.className = "label";
      flightLabel.textContent = "FLT";
      grid.appendChild(flightLabel);

      for (let i = 0; i < 48; i++) {
        const cell = document.createElement("div");
        cell.className = "flight-cell";
        cell.dataset.blockIndex = String(i);

        for (let j = 0; j < 5; j++) {
          const tenth = document.createElement("div");
          tenth.className = "tenth";
          tenth.dataset.row = "flight";
          tenth.dataset.block = String(i);
          tenth.dataset.tenth = String(j);

          tenth.addEventListener("mousedown", (e) => {
            e.preventDefault();
            isDrawing = true;
            paintFlight(tenth);
          });

          tenth.addEventListener("mouseenter", () => {
            if (isDrawing && mode === "flight") {
              paintFlight(tenth);
            }
          });

          tenth.addEventListener("click", () => {
            paintFlight(tenth);
          });

          cell.appendChild(tenth);
        }

        grid.appendChild(cell);
      }

      // Duty row
      const dutyLabel = document.createElement("div");
      dutyLabel.className = "label";
      dutyLabel.textContent = "DUTY";
      grid.appendChild(dutyLabel);

      for (let i = 0; i < 48; i++) {
        const cell = document.createElement("div");
        cell.className = "duty-cell";
        cell.dataset.row = "duty";

        cell.addEventListener("mousedown", (e) => {
          e.preventDefault();
          isDrawing = true;
          paintDuty(cell);
        });

        cell.addEventListener("mouseenter", () => {
          if (isDrawing && mode === "duty") {
            paintDuty(cell);
          }
        });

        cell.addEventListener("click", () => {
          paintDuty(cell);
        });

        grid.appendChild(cell);
      }
    }

    function paintFlight(tenth) {
      if (mode !== "flight") return;
      tenth.classList.add("on");
      updateTotals();
    }

    function paintDuty(cell) {
      if (mode !== "duty") return;
      cell.classList.add("on");
      updateTotals();
    }

    function clearGrid() {
      document.querySelectorAll(".tenth.on").forEach(el => el.classList.remove("on"));
      document.querySelectorAll(".duty-cell.on").forEach(el => el.classList.remove("on"));
      updateTotals();
    }

    function updateTotals() {
      let flight = 0;
      let duty = 0;

      document.querySelectorAll(".tenth.on").forEach(() => {
        flight += 0.1;
      });

      document.querySelectorAll(".duty-cell.on").forEach(() => {
        duty += 0.5;
      });

      flightTotalEl.textContent = flight.toFixed(1);
      dutyTotalEl.textContent = duty.toFixed(1);
    }

    document.addEventListener("mouseup", () => {
      isDrawing = false;
    });

    flightBtn.addEventListener("click", () => setMode("flight"));
    dutyBtn.addEventListener("click", () => setMode("duty"));
    clearBtn.addEventListener("click", clearGrid);

    buildGrid();
    setMode("flight");
    updateTotals();
  </script>

</body>
</html>
