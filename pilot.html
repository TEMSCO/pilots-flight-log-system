<!DOCTYPE html>
<html>
<head>
  <title>Pilot Dashboard</title>
</head>
<body>

  <h1>Pilot Dashboard</h1>

  <h3>Add Flight Log</h3>

  <input id="date" type="date"><br><br>
  <input id="aircraft" placeholder="Aircraft"><br><br>
  <input id="hours" placeholder="Flight Hours"><br><br>

  <button onclick="addLog()">Save Flight</button>

  <p id="status"></p>

  <h3>Saved Flights</h3>
  <ul id="logList"></ul>
  <h3>Total Hours: <span id="totalHours">0</span></h3>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  window.addEventListener("load", () => {

    const sb = window.supabase.createClient(
      "https://xjisftmfjsjomgsjzkod.supabase.co",
      "sb_publishable_5XyiR6l-76O6RFbR1ba2oQ_4p9Gm5oS"
    );

    window.addLog = async function () {
      const date = document.getElementById("date").value;
      const aircraft = document.getElementById("aircraft").value;
      const hours = document.getElementById("hours").value;

      const { error } = await sb
        .from("logs")
        .insert([{ date, aircraft, hours }]);

      if (error) {
        console.error(error);
        document.getElementById("status").innerText = error.message;
      } else {
        document.getElementById("status").innerText = "Flight saved!";
       window.loadLogs = async function () {
  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const { data, error } = await sb
    .from("logs")
    .select("*")
    .eq("user_id", user.id);

  const list = document.getElementById("logList");
  const totalDisplay = document.getElementById("totalHours");

  list.innerHTML = "";

  let total = 0;

  if (data) {
    data.forEach(log => {
      const li = document.createElement("li");
      li.textContent = `${log.date} - ${log.aircraft} - ${log.hours} hrs`;
      list.appendChild(li);

      const hoursNum = parseFloat(log.hours);
      if (!isNaN(hoursNum)) {
        total += hoursNum;
      }
    });
  }

  totalDisplay.innerText = total.toFixed(1);
};

   window.addLog = async function () {
  const date = document.getElementById("date").value;
  const aircraft = document.getElementById("aircraft").value;
  const hours = document.getElementById("hours").value;

  const { data: userData } = await sb.auth.getUser();
  const user = userData.user;

  const { error } = await sb
    .from("logs")
    .insert([{
      date,
      aircraft,
      hours,
      user_id: user.id
    }]);

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = error.message;
  } else {
    document.getElementById("status").innerText = "Flight saved!";
    window.loadLogs();
  }
};
